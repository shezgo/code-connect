<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeConnect Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
        }
        .login-container img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
        }
        .login-container h1 {
            margin-bottom: 30px;
        }
        .login-container input[type="text"],
        .login-container input[type="password"],
        .login-container button {
            width: calc(100% - 40px);
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }
        .login-container button {
            background-color: transparent;
            color: black;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .login-container button:hover {
            background-color: transparent;
        
        }
        .login-container .links {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }
        .login-container .links a {
            color: #007BFF;
            text-decoration: none;
        }
        .login-container .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="" alt="Logo">
        <h1>CodeConnect</h1>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button>Sign In</button>
        <div class="links">
            <a href="./forgotpass.html">Forgot Password</a>
            <a href="./signup.html">Sign Up</a>
        </div>
    </div>
    <footer>
        <div class="footer-container">
            <div class="media-icons">
                <a href=""><i class="fa-brands fa-instagram"></i></a>
                <a href=""><i class="fa-brands fa-facebook"></i></a>
                <a href=""><i class="fa-brands fa-google-plus"></i></a>
                <a href=""><i class="fa-brands fa-youtube"></i></a>
            </div>
            <div class="footer-nav">
                <ul>
                    <li><a href="index.html"><strong>Home</strong></a></li>
                    <li><a href="about.html"><strong>About</strong></a></li>
                    <li><a><strong>Email: CodeConnectSupport@gmail.com</strong></a></li>
                    <li><a><strong>Phone: 888-888-8888</strong></a></li>
                </ul>
            </div>
        </div>
    </footer>
    <div class="footer-bott">
        <p>Copyright &copy;2024; Designed by <span class="designer">CodeConnect</span></p>
    </div>
</body>

</html>
