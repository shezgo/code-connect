<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeConnect Sign Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .signup-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
            margin: 20px auto;
        }
        .signup-container img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            border-radius: 50%; /* Make the image circular */
        }
        .signup-container h1 {
            margin-bottom: 30px;
        }
        .signup-container input[type="text"],
        .signup-container input[type="email"],
        .signup-container input[type="password"],
        .signup-container button {
            width: calc(100% - 40px);
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .signup-container button {
            background-color: transparent;
            color: black;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .signup-container button:hover {
            background-color: transparent;
        }
        .signup-container .links {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
        }
        .signup-container .links a {
            color: #007BFF;
            text-decoration: none;
            margin-top: 10px;
        }
        .signup-container .links a:hover {
            text-decoration: underline;
        }
        footer {
            width: 100%;
            background-color: #62b4c9;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        .footer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .media-icons {
            margin: 10px 0;
        }
        .media-icons a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }
        .footer-nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            margin: 0;
        }
        .footer-nav li {
            margin: 0 15px;
        }
        .footer-nav a {
            color: white;
            text-decoration: none;
        }
        .footer-nav a:hover {
            text-decoration: underline;
        }
        .footer-bott {
            margin-top: 10px;
        }
    </style>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
        function validatePassword() {
            var password = document.getElementById("password").value;
            var confirmPassword = document.getElementById("confirm-password").value;
            var errorMessage = document.getElementById("error-message");
            var passwordPattern = /^(?=.*[0-9])(?=.*[!@#$%^&*])[a-zA-Z0-9!@#$%^&*]{8,}$/;

            if (!passwordPattern.test(password)) {
                errorMessage.textContent = "Password must be more than 8 letters and contain a number and a special character.";
                errorMessage.style.display = "block";
                return false;
            }

            if (password !== confirmPassword) {
                errorMessage.textContent = "Passwords do not match.";
                errorMessage.style.display = "block";
                return false;
            }

            errorMessage.style.display = "none";
            return true;
        }
    </script>
</head>
<body>
    <div class="signup-container">
        <img src="Codeconnect Logo.jpg" alt="Logo">
        <h1>CodeConnect</h1>
        <input type="text" placeholder="Username">
        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">
        <input type="password" placeholder="Confirm Password">
        <button>Sign Up</button>
        <div class="links">
            <p>Have an account?</p>
            <a href="./login.html">Sign In</a>
        </div>
    </div>
    <footer>
        <div class="footer-container">
            <div class="footer-nav">
                <ul>
                    <li><a href="index.html"><strong>Home</strong></a></li>
                    <li><a href="about.html"><strong>About</strong></a></li>
                    <li><a><strong>Email: CodeConnectSupport@gmail.com</strong></a></li>
                    <li><a><strong>Phone: 888-888-8888</strong></a></li>
                </ul>
            </div>
            <div class="media-icons">
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-facebook"></i></a>
                <a href="#"><i class="fa-brands fa-google-plus"></i></a>
                <a href="#"><i class="fa-brands fa-youtube"></i></a>
            </div>
            <div class="footer-bott">
                <p>&copy; 2024 CodeConnect. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
