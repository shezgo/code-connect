<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeConnect Forgot Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .forgot-password-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
            margin-bottom: 20px;
        }
        .forgot-password-container img {
            width: 250px; 
            height: 120px; 
            margin-bottom: 20px;
        }
        .forgot-password-container h1 {
            margin-bottom: 30px;
        }
        .forgot-password-container input[type="email"],
        .forgot-password-container button {
            width: calc(100% - 40px);
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }
        .forgot-password-container button {
            background-color: transparent;
            color: black;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .forgot-password-container button:hover {
            background-color: transparent;
        
        }
        .forgot-password-container .links {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }
        .forgot-password-container .links a {
            color: #007BFF;
            text-decoration: none;
            margin-left: 5px;
        }
        .forgot-password-container .links a:hover {
            text-decoration: underline;
        }
        .contact-info {
            text-align: center;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="forgot-password-container">
        <img src="CodeConnect_Logo.jpg" alt="Logo">
        <h1>Forgot Your Password?</h1>
        <h4>Don't worry, it happens! Please enter your email address that is connected with your CodeConnect account and we will send you a link to reset your password. </h4>
        <input type="email" placeholder="Enter your email">
        <button>Reset Password</button>
        <div class="links">
            <a href="./login.html">Back to Sign In</a>
        </div>
    </div>
    <div class="contact-info">
        <p>Problems or Questions? Contact us @ <a href="mailto:support@codeconnect.com">support@codeconnect.com</a></p>
    </div>
</body>
</html>
