<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  margin: 0; /* Remove default margin */
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Style the header */
.header {
  background-color: #62b4c9;
  padding: 10px;
  text-align: center;
  font-size: 25px;
  color: white;
  position: relative;
}

.logo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
}

.header .brand {
  position: absolute;
  top: 20px;
  right: 10px;
  font-size: 20px;
}

/* Container for flexboxes */
.row {
  display: flex;
  flex: 1; /* Ensure the row takes up available space */
}

/* Create three unequal columns that sits next to each other */
.column {
  padding: 10px;
}

/* Left columns stacked */
.column.side {
  flex: 1;
  margin-bottom: 10px;
}

/* Right column takes the rest of the space */
.column.middle {
  flex: 2;
  margin-bottom: 10px;
}

/* Style the footer */
footer {
  width: 100%;
  background-color: #62b4c9;
  color: white;
  padding: 10px 0;
  text-align: center;
  margin-top: auto;
}
.footer-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.media-icons {
  margin: 10px 0;
}
.media-icons a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}
.footer-nav ul {
  list-style: none;
  padding: 0;
  display: flex;
  justify-content: center;
  margin: 0;
}
.footer-nav li {
  margin: 0 15px;
}
.footer-nav a {
  color: white;
  text-decoration: none;
}
.footer-nav a:hover {
  text-decoration: underline;
}
.footer-bott {
  margin-top: 10px;
}

/* Style for links in header */
.header a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
}
.header a:hover {
  text-decoration: underline;
}

/* Welcome box and search bar */
.welcome-box {
  text-align: center;
  padding: 20px;
  background-color: #f0f0f0;
  border-bottom: 1px solid #ccc;
}
.search-container {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}
.search-container input[type="text"] {
  width: 50%;
  padding: 10px;
  border: 1px solid #ccc;
  border-right: none;
}
.search-container button {
  padding: 10px;
  border: 1px solid #ccc;
  background-color: #62b4c9;
  color: white;
  cursor: pointer;
}
.search-container button:hover {
  background-color: #5393a1;
}

/* Responsive layout - makes the three columns stack on top of each other instead of next to each other */
@media (max-width: 600px) {
  .row {
    flex-direction: column;
  }
}
</style>
</head>
<body>

  <h2>Home Page</h2>

</div>

</div>

  <br>
</div>

</div>

</body>
