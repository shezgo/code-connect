    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 80%;
            margin: 20px auto;
            flex-grow: 1;
        }
        .header {
            background-color: #040404;
            padding: 5px;
            text-align: center;
            font-size: 20px;
            color: white;
            position: relative;
        }
        .logo {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .header .brand {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 18px;
        }
        .login-signup {
            position: absolute;
            top: 40px;
            right: 10px;
            font-size: 14px;
        }
        .login-signup a {
            color: white;
            text-decoration: none;
            margin: 0 5px;
        }
        .login-signup a:hover {
            text-decoration: underline;
        }
        .header a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .section-title {
            text-align: center;
            margin: 30px 0;
        }
        .mentorship-container input[type="text"],
        .mentorship-container input[type="email"],
        .mentorship-container select,
        .mentorship-container textarea,
        .mentorship-container button {
            width: calc(100% - 40px);
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .mentorship-container button {
            padding: 10px 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        .mentorship-container button:hover {
            background-color: #333;
        }
        footer {
            width: 100%;
            background-color: #000000;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        .footer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .media-icons {
            margin: 10px 0;
        }
        .media-icons a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }
        .footer-nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            margin: 0;
        }
        .footer-nav li {
            margin: 0 15px;
        }
        .footer-nav a {
            color: white;
            text-decoration: none;
        }
        .footer-nav a:hover {
            text-decoration: underline;
        }
        .footer-bott {
            margin-top: 10px;
        }
    </style>
    <script>
        //added script that doesnt allow users to click submit unless all fields are filled out
        document.addEventListener('DOMContentLoaded', function () {
            const nameInput = document.querySelector('input[type="text"]');
            const emailInput = document.querySelector('input[type="email"]');
            const selectInput = document.querySelector('select');
            const textareaInput = document.querySelector('textarea');
            const submitButton = document.querySelector('button');

            function validateForm() {
                const isValid = nameInput.value.trim() !== '' &&
                    emailInput.value.trim() !== '' &&
                    selectInput.value !== '' &&
                    textareaInput.value.trim() !== '';
                submitButton.disabled = !isValid;
                submitButton.style.cursor = isValid ? 'pointer' : 'not-allowed';
            }

            nameInput.addEventListener('input', validateForm);
            emailInput.addEventListener('input', validateForm);
            selectInput.addEventListener('change', validateForm);
            textareaInput.addEventListener('input', validateForm);

            validateForm(); //checks if fields are filled
        });
    </script>
</head>
<body>
    <div class="header">

            <h2>Apply here to become a mentor</h2>
        </div>
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email Address">
        <select>
            <option value="" disabled selected>Select Expertise</option>
            <option value="frontend">Frontend Development</option>
            <option value="backend">Backend Development</option>
            <option value="database">Databases</option>
            <option value="dsa">Data structures and Algorithms</option>
        </select>
        <textarea placeholder="Tell us about your experience and how you can help" rows="4"></textarea>
        <button disabled>Submit</button>
    </div>
    <footer>

            <div class="media-icons">

                <a href="#"><i class="fa-brands fa-youtube"></i></a>
            </div>
            <div class="footer-bott">
                <p>&copy; 2024 CodeConnect. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
