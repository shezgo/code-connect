<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/application/verticalPrototype/folder/frontend-css/become_mentor.css">
    <title>Become a Mentor</title>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const nameInput = document.querySelector('input[type="text"]');
    const emailInput = document.querySelector('input[type="email"]');
    const selectInput = document.querySelector("select");
    const textareaInput = document.querySelector("textarea");
    const submitButton = document.querySelector("button");

    function validateForm() {
      const isValid =
        nameInput.value.trim() !== "" &&
        emailInput.value.trim() !== "" &&
        selectInput.value !== "" &&
        textareaInput.value.trim() !== "";
      submitButton.disabled = !isValid;
      submitButton.style.cursor = isValid ? "pointer" : "not-allowed";
    }

    nameInput.addEventListener("input", validateForm);
    emailInput.addEventListener("input", validateForm);
    selectInput.addEventListener("change", validateForm);
    textareaInput.addEventListener("input", validateForm);

    submitButton.addEventListener("click", function (event) {
      if (!submitButton.disabled) {
        window.location.href = "mentors.html";
      }
    });

    validateForm(); // checks if fields are filled
  });
</script>

  </head>
  <body>
    <div class="header">
        <a href="homepage.html" class="logo-container">
            <img src="Codeconnect Logo.jpg" alt="Logo" class="logo" />
          </a>
        <div class="brand">CodeConnect</div>
        <div class="login-signup">
          <a href="login.html">Sign Out</a>
        </div>
        <h2>Become a Mentor</h2>
        <a href="homepage.html">Home</a>
        <a href="challenges.html">Challenges</a>
        <a href="mentors.html">Mentors</a>
        <a href="forum.html">Forums</a>
        <a href="store.html">Memberships</a>
        <a href="premium.html">Premium</a>
        <a href="explore.html">Explore</a>
        <a href="workspace.html">Workspaces</a>
        <a href="leaderboards.html">Leaderboards</a>
        <a href="jobs.html">Jobs</a>
      </div>
    <div class="container mentorship-container">
      <div class="section-title">
        <h2>Apply here to become a mentor now!</h2>
      </div>
      <input type="text" placeholder="Name" />
      <input type="email" placeholder="Email Address" />
      <select>
        <option value="" disabled selected>Select Expertise</option>
        <option value="frontend">Frontend Development</option>
        <option value="backend">Backend Development</option>
        <option value="database">Databases</option>
        <option value="fullstack">Full Stack</option>
        <option value="fullstack">UX Designer</option>
        <input type="text" id="expertise-input" name="other-expertise" placeholder="Please specify your expertise">
      </select>
      <input type="projects" placeholder="Do you have any outstanding projects to display?"/>
      <input type="college" placeholder="Did you graduate from college and when? If not applicable, type in N/A"/>
      <input type="degree" placeholder="Do you have a degree or self learned? If not applicable, type in NA"/>
      <input type="origin" placeholder="Why do you want to become a Mentor for CodeConnect?"/>
      <input type="experience" placeholder="How many years of experience do you have?"/>
      <textarea
        placeholder="Tell us about your experience and how you can help"
        rows="4"
      ></textarea>
      <button disabled>Submit</button>
    </div>
