    <title>Inbox Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      .sidebar {
        width: 100px;
        background-color: #f0f0f0;
        border-right: 1px solid #ccc;
        overflow-y: auto;
        padding-top: 20px;
        height: 50%;
      }
      .conversation {
        padding: 10px;
        text-align: center;
        cursor: pointer;
      }
      .conversation:hover {
        background-color: #e0e0e0;
      }
      .conversation img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        margin-bottom: 5px;
      }
      .chat-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 15px;
        background-color: #fafafa;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        padding-bottom: 15px;
      }
      .input-area {
        display: flex;
        border-top: 1px solid #ccc;
        padding-top: 10px;
      }
      .input-area input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 20px;
        margin-right: 10px;
      }
      .input-area button {
        padding: 10px 15px;
        border: none;
        background-color: #007bff;
        color: white;
        border-radius: 20px;
        cursor: pointer;
      }
      .input-area button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
