<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
  />
  <title>Inbox Page</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      background-color: #62b4c9;
      padding: 5px;
      text-align: center;
      font-size: 20px;
      color: white;
      position: relative;
    }

    .logo {
      position: absolute;
      top: 5px;
      left: 5px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .header .brand {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 18px;
    }

    .login-signup {
      position: absolute;
      top: 40px;
      right: 10px;
      font-size: 14px;
    }

    .login-signup a {
      color: white;
      text-decoration: none;
      margin: 0 5px;
    }

    .login-signup a:hover {
      text-decoration: underline;
    }

    .search-container {
      position: absolute;
      top: 70px;
      right: 10px;
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }

    .search-container input[type="text"] {
      padding: 5px;
      border: 1px solid #ccc;
      border-right: none;
      border-radius: 4px 0 0 4px;
    }

    .search-container button {
      padding: 5px;
      border: 1px solid #ccc;
      color: white;
      cursor: pointer;
      border-radius: 0 4px 4px 0;
      background-color: #000000;
    }

    .search-container button:hover {
      background-color: #333333;
    }

    .header a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }
    
    .header a:hover {
      text-decoration: underline;
    }

    .icon-button {
      color: white;
      text-decoration: none;
      margin: 0 5px;
    }

    .icon-button svg {
      width: 20px;
      height: 20px;
    }

    .sidebar {
      width: 100px;
      background-color: #f0f0f0;
      border-right: 1px solid #ccc;
      overflow-y: auto;
      padding-top: 20px;
      height: 50%;
    }

    .conversation {
      padding: 10px;
      text-align: center;
      cursor: pointer;
    }

    .conversation:hover {
      background-color: #e0e0e0;
    }

    .conversation img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-bottom: 5px;
    }

    .chat-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 15px;
      background-color: #fafafa;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 15px;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ccc;
      padding-top: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 20px;
      margin-right: 10px;
    }

    .input-area button {
      padding: 10px 15px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }

    .input-area button:hover {
      background-color: #0056b3;
    }

    footer {
      width: 100%;
      background-color: #62b4c9;
      color: white;
      padding: 10px 0;
      text-align: center;
      margin-top: auto;
    }

    .footer-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .media-icons {
      margin: 10px 0;
    }

    .media-icons a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .footer-nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      justify-content: center;
      margin: 0;
    }

    .footer-nav li {
      margin: 0 15px;
    }

    .footer-nav a {
      color: white;
      text-decoration: none;
    }

    .footer-nav a:hover {
      text-decoration: underline;
    }

    .footer-bott {
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .header {
        padding: 10px;
        font-size: 18px;
      }

      .header a {
        margin: 0 5px;
      }

      .icon-button svg {
        width: 16px;
        height: 16px;
      }

      .sidebar {
        width: 80px;
      }
    }
    .login-signup {
        position: absolute;
        top: 40px;
        right: 10px;
        font-size: 14px;
      }
      .login-signup a {
        color: white;
        text-decoration: none;
        margin: 0 5px;
      }
      .login-signup a:hover {
        text-decoration: underline;
      }
  </style>
</head>
<body>
  <div class="header">
    <a href="homepage.html" class="logo-container">
      <img src="Codeconnect Logo.jpg" alt="Logo" class="logo" />
    </a>
    <div class="brand">CodeConnect</div>
    <h2>Inbox</h2>
    <div class="login-signup">
      <a href="login.html">Sign Out</a>
    </div>
    <a href="homepage.html">Home</a>
    <a href="challenges.html">Challenges</a>
    <a href="mentors.html">Mentors</a>
    <a href="forum.html">Forums</a>
    <a href="store.html">Memberships</a>
    <a href="premium.html">Premium</a>
    <a href="explore.html">Explore</a>
    <a href="workspace.html">Workspaces</a>
    <a href="leaderboards.html">Leaderboards</a>
    <a href="jobs.html">Jobs</a>
    <a href="inbox.html" class="icon-button">
      <svg
        class="mail-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"

        <path d="M4 4l8 8 8-8" />

    <a href="profile.html" class="icon-button">

        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"
        />
      </svg>
    </a>

    <div class="sidebar">
      <div class="conversation">
        <img src="https://via.placeholder.com/40" alt="Profile Picture" />
        <div>John</div>
      </div>
      <div class="conversation">
        <img src="https://via.placeholder.com/40" alt="Profile Picture" />
        <div>Jane</div>
      </div>
      <div class="conversation">
        <img src="https://via.placeholder.com/40" alt="Profile Picture" />
        <div>Mike</div>
      </div>
      <div class="conversation">
        <img src="https://via.placeholder.com/40" alt="Profile Picture" />
        <div>Lisa</div>
      </div>
      <div class="conversation">
        <img src="https://via.placeholder.com/40" alt="Profile Picture" />
        <div>Chris</div>
      </div>
      <!-- Add more conversations as needed -->
    </div>
  </div>

  <div class="chat-content">
    <div class="messages">
      <!-- Messages will appear here -->
    </div>
    <div class="input-area">
      <input type="text" placeholder="Type a message..." />
      <button>Send</button>
    </div>
  </div>
  
  <footer>
    <div class="footer-container">
      <div class="footer-nav">
        <ul>
          <li><a href="index.html"><strong>Home</strong></a></li>
          <li><a href="about.html"><strong>About</strong></a></li>
          <li><a><strong>Email: CodeConnectSupport@gmail.com</strong></a></li>
          <li><a><strong>Phone: 888-888-8888</strong></a></li>
        </ul>
      </div>
      <div class="media-icons">
        <a href="https://www.instagram.com/codeconnect"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.facebook.com/codeconnect"><i class="fa-brands fa-facebook"></i></a>
        <a href="https://www.google.com/codeconnect"><i class="fa-brands fa-google-plus"></i></a>
        <a href="https://www.youtube.com/codeconnect"><i class="fa-brands fa-youtube"></i></a>
      </div>
      <div class="footer-bott">
        <p>&copy; 2024 CodeConnect. All rights reserved.</p>
      </div>
    </div>
  </footer>
</body>
</html>
